<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Porsche | Official Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"
        integrity="sha512-16esztaSRplJROstbIIdwX3N97V1+pZvV33ABoG1H2OyTttBxEGkTsoIVsiP1iaTtM8b3+hu2kB6pQ4Clr5yug=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="src/css/style.css">

    <link rel="shortcut icon" href="src/imgs/icoporche.png" type="image/x-icon">
</head>

<body>
    <main>
        <div class="logo">
            <img src="src/imgs/porscheicogold.png" alt="Logo Porche" style="height: 75px;">
        </div>
        <div class="social"> <!-- Lista de Redes Sociais -->
            <div class="bar"></div>
            <a href=""><i class="fab fa-facebook"></i></a> <!-- Facebook -->
            <a href=""><i class="fab fa-instagram"></i></a> <!-- Instagram -->
            <a href=""><i class="fab fa-x-twitter"></i></a> <!-- X -->
        </div>
        <div class="menu">
            <i class="fas fa-bars"></i> <!-- Sinal Menu Hamburguer -->
        </div>
        <div class="swiper">
            <div class="swiper-wrapper"> <!-- Numeros Sliders -->
                <div class="swiper-slide first"> <!-- Primeiro Slider com a Class first -->
                    <div class="yellow"></div> <!-- Cor primaria primeiro Slider com a Class first -->
                    <div class="black"></div> <!-- Cor secundaria primeiro Slider com a Class first -->
                    <div class="content"> <!-- primeira div do primeiro slide -->
                        <div class="title">
                            <div class="small">Porsche</div>
                            <div class="big">
                                <span>C</span><span>a</span><span>y</span><span>e</span><span>n</span><span>n</span><span>e</span>
                            </div>
                        </div>
                        <div class="image"> <!-- Primeira imagem -->
                            <img src="src/imgs/img-1.png" alt="">
                        </div>
                        <div class="specs"> <!-- Specs do carro -->
                            <span><b>302</b> MPH</span>
                            <span><b>0-100</b> KMPH</span>
                            <span><b>350</b> KW</span>
                            <button>Discover Now <i class="fas fa-arrow-right"></i></button> <!-- Botão Discover -->
                        </div>
                    </div>
                </div>
                <div class="swiper-slide"> <!-- Segundo Slider com a Class first -->
                    <div class="red"></div> <!-- Cor primaria segundo Slider com a Class first -->
                    <div class="black"></div> <!-- Cor secundaria segundo Slider com a Class first -->
                    <div class="content"> <!-- primeira div do segundo slide -->
                        <div class="title">
                            <div class="small">Porsche</div>
                            <div class="big">911 Turbo</div>
                        </div>
                        <div class="image"> <!-- Segunda imagem -->
                            <img src="src/imgs/img-2.png" alt="">
                        </div>
                        <div class="specs red-c"> <!-- Specs do carro -->
                            <span><b>302</b> MPH</span>
                            <span><b>0-100</b> KMPH</span>
                            <span><b>350</b> KW</span>
                            <button class="red-c">Discover Now <i class="fas fa-arrow-right"></i></button>
                            <!-- Botão Discover -->
                        </div>
                    </div>
                </div>
                <div class="swiper-slide"> <!-- Terceiro Slider com a Class first -->
                    <div class="blue"></div> <!-- Cor primaria segundo Slider com a Class first -->
                    <div class="black"></div> <!-- Cor secundaria segundo Slider com a Class first -->
                    <div class="content"> <!-- primeira div do segundo slide -->
                        <div class="title">
                            <div class="small">Porsche</div>
                            <div class="big">Carrera GT</div>
                        </div>
                        <div class="image"> <!-- Terceira imagem -->
                            <img src="src/imgs/img-3.png" alt="">
                        </div>
                        <div class="specs blue-c"> <!-- Specs do carro -->
                            <span><b>302</b> MPH</span>
                            <span><b>0-100</b> KMPH</span>
                            <span><b>350</b> KW</span>
                            <button class="blue-c">Discover Now <i class="fas fa-arrow-right"></i></button>
                            <!-- Botão Discover -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="swiper-pagination"></div> <!-- Botão dos numero ao lado para passar pro proximo -->
        </div>
    </main>

    <!-- Swiper JS -->
    <script type="module" src="./src/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>


    <!-- Initialize Swiper -->
    <script>

    </script>
</body>

</html>
